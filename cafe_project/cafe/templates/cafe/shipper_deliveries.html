{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipper - Đơn giao hàng | CafeFlow</title>
    <link rel="stylesheet" href="{% static 'cafe/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg, #f8f6f3); color: var(--text, #1a1a1a); }

        .shipper-header {
            background: linear-gradient(135deg, var(--coffee-dark, #3f2518) 0%, var(--coffee, #5d3926) 100%);
            color: #fff; padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .shipper-header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin: 0; }
        .shipper-header .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .shipper-header .badge-count { background: var(--red, #dc2626); color: #fff; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 12px; animation: pulse-badge 2s infinite; }
        @keyframes pulse-badge { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .shipper-header a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; transition: all 0.15s; }
        .shipper-header a:hover { color: #fff; }

        .shipper-layout { display: flex; height: calc(100vh - 52px); }

        .shipper-sidebar { width: 380px; background: var(--surface, #fff); overflow-y: auto; border-right: 1px solid var(--border, #eae5df); }
        .shipper-sidebar::-webkit-scrollbar { width: 5px; }
        .shipper-sidebar::-webkit-scrollbar-thumb { background: rgba(93,57,38,0.12); border-radius: 3px; }

        .sidebar-title { padding: 14px 16px; font-size: 14px; font-weight: 700; color: var(--text, #1a1a1a); border-bottom: 1px solid var(--border-light, #f0ece7); background: var(--surface-hover, #faf9f7); position: sticky; top: 0; z-index: 1; }

        .order-card { padding: 12px 16px; border-bottom: 1px solid var(--border-light, #f0ece7); cursor: pointer; transition: all 0.15s; }
        .order-card:hover { background: var(--surface-hover, #faf9f7); }
        .order-card.active { background: var(--bg-2, #f2efeb); border-left: 3px solid var(--coffee, #5d3926); }
        .order-card .order-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .order-card .order-id { font-weight: 700; color: var(--text, #1a1a1a); font-size: 14px; }
        .order-card .order-time { font-size: 11px; color: var(--muted, #888); }
        .order-card .order-customer { font-size: 13px; color: var(--text-secondary, #555); margin-bottom: 4px; }
        .order-card .order-address { font-size: 12px; color: var(--muted, #888); }
        .order-card .order-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .order-card .badge { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
        .badge-waiting { background: rgba(217,119,6,0.08); color: #92400e; }
        .badge-assigned { background: rgba(125, 90, 32, 0.10); color: #7c4a03; }
        .badge-accepted { background: rgba(8,145,178,0.10); color: #155e75; }
        .badge-shipping { background: rgba(37,99,235,0.08); color: #1e40af; }
        .badge-failed { background: rgba(220,38,38,0.08); color: #b91c1c; }
        .badge-price { background: rgba(22,163,74,0.08); color: #166534; }
        .badge-branch { background: #f0e6dc; color: #4a2c1d; }
        .order-meta { font-size: 11px; color: #777; margin-top: 6px; line-height: 1.5; }
        .order-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .order-actions button { border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
        .btn-accept { background: #e0f2fe; color: #075985; }
        .btn-reject { background: #fee2e2; color: #b91c1c; }
        .btn-start { background: #dbeafe; color: #1d4ed8; }
        .btn-done { background: #dcfce7; color: #166534; }
        .btn-fail { background: #fef3c7; color: #92400e; }

        .no-orders { padding: 40px 16px; text-align: center; color: var(--muted, #888); }
        .no-orders .no-icon { font-size: 48px; margin-bottom: 12px; }

        .shipper-map-wrap { flex: 1; position: relative; }
        #shipper-map { width: 100%; height: 100%; }

        .refresh-btn { position: absolute; top: 12px; right: 12px; z-index: 999; background: var(--surface, #fff); border: 1px solid var(--border, #eae5df); border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.15s; font-family: inherit; color: var(--text, #1a1a1a); }
        .refresh-btn:hover { background: var(--surface-hover, #faf9f7); }

        .gps-status { position: absolute; top: 12px; left: 12px; z-index: 999; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 6px; }
        .gps-dot { width: 10px; height: 10px; border-radius: 50%; }
        .gps-active { background: #22c55e; }
        .gps-inactive { background: #ef4444; }

        .map-legend { position: absolute; bottom: 30px; left: 12px; z-index: 999; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 14px; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .map-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .map-legend-item:last-child { margin-bottom: 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-line { width: 24px; height: 3px; border-radius: 2px; }

        @media (max-width: 768px) {
            .shipper-layout { flex-direction: column; height: auto; }
            .shipper-sidebar { width: 100%; max-height: 50vh; }
            .shipper-map-wrap { height: 50vh; }
        }
    </style>
</head>
<body>
    <div class="shipper-header">
        <h1>🚀 CafeFlow Shipper</h1>
        <div class="header-right">
            <span>👤 {{ request.session.user_name }}</span>
            <span class="badge-count" id="orderCount">0</span> đơn
            <a href="{% url 'logout' %}">🚪 Đăng xuất</a>
        </div>
    </div>

    <div class="shipper-layout">
        <div class="shipper-sidebar">
            <div class="sidebar-title">📦 Đơn cần giao</div>
            <div id="orderList">
                <div class="no-orders">
                    <div class="no-icon">📭</div>
                    <p>Đang tải danh sách đơn...</p>
                </div>
            </div>
        </div>

        <div class="shipper-map-wrap">
            <div id="shipper-map"></div>
            <button class="refresh-btn" onclick="loadDeliveries()">🔄 Làm mới</button>
            
            <div class="gps-status" id="gpsStatus">
                <span class="gps-dot gps-inactive" id="gpsDot"></span>
                <span id="gpsLabel">Đang lấy GPS...</span>
            </div>

            <div class="map-legend">
                <div class="map-legend-item">
                    <span class="legend-dot" style="background:#e74c3c;"></span>
                    <span>📍 Khách giao hàng</span>
                </div>
                <div class="map-legend-item">
                    <span class="legend-dot" style="background:#8B4513;"></span>
                    <span>☕ Chi nhánh</span>
                </div>
                <div class="map-legend-item">
                    <span class="legend-dot" style="background:#f39c12;"></span>
                    <span>🚚 Vị trí shipper</span>
                </div>
                <div class="map-legend-item">
                    <span class="legend-line" style="background:#3498db;"></span>
                    <span style="color:#888;">- - Route chưa giao</span>
                </div>
                <div class="map-legend-item">
                    <span class="legend-line" style="background:#22c55e;"></span>
                    <span style="color:#888;">── Route đang giao</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
    'use strict';

    console.log('[SHIPPER] === BẮT ĐẦU KHỞI TẠO ===');

    // ==================== GLOBAL STATE ====================
    let isMapFitted = false;
    let allOrders = [];
    let currentWatchId = null;
    const currentUserRole = "{{ request.session.user_role|default:'' }}";

    // Vị trí GPS thật của shipper - DÙNG CHO ROUTE khi shipping
    let currentShipperLat = null;
    let currentShipperLng = null;

    // ==================== MAP INIT ====================
    const map = L.map('shipper-map').setView([10.762622, 106.660172], 13);

    L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=vi&x={x}&y={y}&z={z}', {
        maxZoom: 19,
        attribution: '&copy; Google Maps'
    }).addTo(map);

    // ==================== MARKER ARRAYS ====================
    let customerMarkers = [];      // 📍 Marker khách giao hàng (màu đỏ)
    let branchMarkers = [];        // ☕ Marker chi nhánh (màu nâu)
    let shipperGpsMarker = null;   // 🚚 Marker GPS thật của shipper (màu cam)
    let activeRoutePolyline = null; // Route line đang hiển thị
    let activeRouteOrder = null;    // Order đang active

    // ==================== ICONS ====================
    const customerIcon = L.divIcon({ html: '<div style="font-size:28px;text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">📍</div>', iconSize: [32, 36], iconAnchor: [16, 36], popupAnchor: [0, -36], className: '' });
    const branchIcon = L.divIcon({ html: '<div style="font-size:24px;text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">☕</div>', iconSize: [28, 32], iconAnchor: [14, 32], popupAnchor: [0, -32], className: '' });
    const shipperIcon = L.divIcon({ html: '<div style="font-size:26px;text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">🚚</div>', iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -30], className: '' });

    // ==================== HELPER ====================
    function getCookie(name) {
        const cookieValue = document.cookie.split('; ').find(row => row.startsWith(name + '='));
        return cookieValue ? decodeURIComponent(cookieValue.split('=')[1]) : '';
    }

    function badgeClassForDeliveryStatus(statusCode) {
        if (statusCode === 'waiting') return 'badge-waiting';
        if (statusCode === 'assigned') return 'badge-assigned';
        if (statusCode === 'accepted') return 'badge-accepted';
        if (statusCode === 'shipping') return 'badge-shipping';
        if (statusCode === 'failed') return 'badge-failed';
        return 'badge-branch';
    }

    // ==================== GPS TRACKING ====================
    function startShipperTracking() {
        console.log('[GPS] Bắt đầu tracking...');
        
        if (!navigator.geolocation) {
            console.warn('[GPS] Trình duyệt không hỗ trợ geolocation');
            updateGpsStatus(false, 'Trình duyệt không hỗ trợ GPS');
            return;
        }

        function updateShipperPosition(position) {
            currentShipperLat = position.coords.latitude;
            currentShipperLng = position.coords.longitude;

            console.log('[GPS] Vị trí cập nhật:', currentShipperLat, currentShipperLng);
            updateGpsStatus(true, 'GPS: ' + currentShipperLat.toFixed(4) + ', ' + currentShipperLng.toFixed(4));

            if (shipperGpsMarker) {
                shipperGpsMarker.setLatLng([currentShipperLat, currentShipperLng]);
            } else {
                console.log('[GPS] Tạo marker GPS mới');
                shipperGpsMarker = L.marker([currentShipperLat, currentShipperLng], {
                    icon: shipperIcon,
                    zIndexOffset: 2000
                }).addTo(map).bindPopup('🚚 <b>Vị trí của bạn</b><br>(GPS thật từ điện thoại)');
            }

            // Nếu đơn đang active là shipping, cập nhật route
            if (activeRoutePolyline && activeRouteOrder && activeRouteOrder.delivery_status_code === 'shipping') {
                console.log('[GPS] Đơn đang shipping, cập nhật route theo GPS mới');
                fetchRouteFromGps();
            }
        }

        function handleError(error) {
            currentShipperLat = null;
            currentShipperLng = null;
            let msg = 'Lỗi GPS';
            if (error.code === 1) msg = 'Chưa cấp quyền GPS';
            else if (error.code === 2) msg = 'GPS không khả dụng';
            else if (error.code === 3) msg = 'Timeout GPS';
            console.warn('[GPS] Lỗi:', msg);
            updateGpsStatus(false, msg);
        }

        currentWatchId = navigator.geolocation.watchPosition(
            updateShipperPosition,
            handleError,
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    }

    function updateGpsStatus(active, label) {
        const dot = document.getElementById('gpsDot');
        const labelEl = document.getElementById('gpsLabel');
        if (dot) dot.className = 'gps-dot ' + (active ? 'gps-active' : 'gps-inactive');
        if (labelEl) labelEl.textContent = label;
    }

    // ==================== ORDER ACTIONS ====================
    function submitDeliveryAction(orderId, action, requireReason = false) {
        let reason = '';
        if (requireReason) {
            reason = window.prompt(action === 'fail' ? 'Nhập lý do giao thất bại:' : 'Nhập lý do từ chối đơn:') || '';
            if (!reason.trim()) { alert('Vui lòng nhập lý do để tiếp tục.'); return; }
        }

        const formData = new FormData();
        if (reason) formData.append('reason', reason.trim());

        fetch(`/shipper/deliveries/${orderId}/${action}/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' },
            body: formData
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok || !data.success) throw new Error(data.message || 'Thao tác thất bại');
            alert(data.message);
            clearActiveRoute();
            loadDeliveries();
        })
        .catch(err => { alert(err.message || 'Có lỗi xảy ra khi cập nhật đơn giao hàng'); });
    }

    function renderOrderActions(o) {
        if (currentUserRole !== 'shipper' || !o.is_mine) return '';
        if (o.delivery_status_code === 'assigned') {
            return '<div class="order-actions"><button type="button" class="btn-accept" onclick="event.stopPropagation(); submitDeliveryAction(' + o.id + ', \'accept\')">Nhận đơn</button><button type="button" class="btn-reject" onclick="event.stopPropagation(); submitDeliveryAction(' + o.id + ', \'reject\', true)">Từ chối</button></div>';
        }
        if (o.delivery_status_code === 'accepted') {
            return '<div class="order-actions"><button type="button" class="btn-start" onclick="event.stopPropagation(); submitDeliveryAction(' + o.id + ', \'start\')">Bắt đầu giao</button><button type="button" class="btn-reject" onclick="event.stopPropagation(); submitDeliveryAction(' + o.id + ', \'reject\', true)">Từ chối</button></div>';
        }
        if (o.delivery_status_code === 'shipping') {
            return '<div class="order-actions"><button type="button" class="btn-done" onclick="event.stopPropagation(); submitDeliveryAction(' + o.id + ', \'complete\')">Giao thành công</button><button type="button" class="btn-fail" onclick="event.stopPropagation(); submitDeliveryAction(' + o.id + ', \'fail\', true)">Báo thất bại</button></div>';
        }
        return '';
    }

    // ==================== POPUP ====================
    function createCustomerPopup(o) {
        return '<div style="min-width:200px;font-family:\'Be Vietnam Pro\',sans-serif;font-size:13px;"><div style="font-weight:700;color:#c0392b;font-size:15px;margin-bottom:6px;">📍 Điểm giao #'+o.id+'</div><div style="margin-bottom:4px;">👤 <b>'+o.customer_name+'</b></div><div style="margin-bottom:4px;">📱 <a href="tel:'+o.customer_phone+'" style="color:#2980b9;">'+o.customer_phone+'</a></div><div style="margin-bottom:4px;">📍 '+(o.customer_address || 'N/A')+'</div>'+(o.branch ? '<div style="margin-bottom:4px;color:#8B4513;">☕ Chi nhánh: '+o.branch.name+'</div>' : '')+'<hr style="border:none;border-top:1px solid #eee;margin:6px 0;"><div style="margin-bottom:4px;">📏 Khoảng cách: <b>'+(o.delivery_distance >= 1000 ? (o.delivery_distance/1000).toFixed(1)+' km' : Math.round(o.delivery_distance)+' m')+'</b></div><div style="margin-bottom:4px;">💰 Tổng: <b>'+o.total_price.toLocaleString('vi-VN')+'đ</b> (Phí giao: '+o.delivery_fee.toLocaleString('vi-VN')+'đ)</div>'+(o.note ? '<div style="margin-top:4px;color:#856404;">📝 '+o.note+'</div>' : '')+'</div>';
    }

    // ==================== LOAD DELIVERIES ====================
    function loadDeliveries() {
        console.log('[API] Đang tải đơn hàng...');
        fetch("{% url 'api_shipper_deliveries' %}")
            .then(r => r.json())
            .then(data => {
                console.log('[API] Đã tải', data.length, 'đơn');
                allOrders = data;
                renderOrderList(data);
                renderMapPins(data);
                document.getElementById('orderCount').textContent = data.length;
            })
            .catch(err => {
                console.error('[API] Lỗi tải đơn:', err);
                document.getElementById('orderList').innerHTML = '<div class="no-orders"><div class="no-icon">⚠️</div><p>Lỗi tải đơn hàng</p></div>';
            });
    }

    // ==================== RENDER ORDER LIST ====================
    function renderOrderList(orders) {
        const container = document.getElementById('orderList');
        if (orders.length === 0) {
            container.innerHTML = '<div class="no-orders"><div class="no-icon">✅</div><p>Hiện không có đơn giao hàng phù hợp</p></div>';
            return;
        }

        container.innerHTML = orders.map((o, idx) => {
            const isActive = activeRouteOrder && activeRouteOrder.id === o.id;
            return '<div class="order-card '+(isActive ? 'active' : '')+'" id="order-card-'+o.id+'" onclick="focusOrder('+idx+')"><div class="order-top"><span class="order-id">#'+o.id+'</span><span class="order-time">'+o.created_at+'</span></div><div class="order-customer">👤 '+o.customer_name+' &bull; 📱 '+o.customer_phone+'</div><div class="order-address">📍 '+(o.customer_address || 'Chưa có địa chỉ')+'</div><div class="order-badges"><span class="badge '+badgeClassForDeliveryStatus(o.delivery_status_code)+'">'+o.delivery_status+'</span><span class="badge badge-price">'+o.total_price.toLocaleString('vi-VN')+'đ</span>'+(o.branch ? '<span class="badge badge-branch">☕ '+o.branch.name+'</span>' : '')+'</div><div class="order-meta">'+(o.assigned_shipper_name ? '<div>Shipper: <strong>'+o.assigned_shipper_name+'</strong></div>' : '<div>Shipper: <strong>Chưa gán</strong></div>')+(o.assigned_at ? '<div>Gán lúc: '+o.assigned_at+'</div>' : '')+(o.accepted_at ? '<div>Nhận đơn: '+o.accepted_at+'</div>' : '')+(o.started_delivery_at ? '<div>Bắt đầu giao: '+o.started_delivery_at+'</div>' : '')+(o.failure_reason ? '<div style="color:#b91c1c;">Lý do lỗi: '+o.failure_reason+'</div>' : '')+'</div>'+renderOrderActions(o)+'</div>';
        }).join('');
    }

    // ==================== RENDER MAP PINS ====================
    function renderMapPins(orders) {
        console.log('[MAP] Đang vẽ markers...');
        
        customerMarkers.forEach(m => map.removeLayer(m));
        branchMarkers.forEach(m => map.removeLayer(m));
        customerMarkers = [];
        branchMarkers = [];

        const bounds = [];
        const branchSet = new Set();

        orders.forEach((o, idx) => {
            // 1. MARKER KHÁCH
            if (o.customer_lat && o.customer_lng) {
                console.log('[MAP] Marker khách #' + o.id + ':', o.customer_lat, o.customer_lng);
                const cMarker = L.marker([o.customer_lat, o.customer_lng], { icon: customerIcon })
                    .addTo(map)
                    .bindPopup(createCustomerPopup(o));
                cMarker._orderIdx = idx;
                customerMarkers.push(cMarker);
                bounds.push([o.customer_lat, o.customer_lng]);
            }

            // 2. MARKER CHI NHÁNH
            if (o.branch && o.branch.lat && o.branch.lng) {
                const bKey = o.branch.lat + '-' + o.branch.lng;
                if (!branchSet.has(bKey)) {
                    branchSet.add(bKey);
                    console.log('[MAP] Marker chi nhánh:', o.branch.name, o.branch.lat, o.branch.lng);
                    const bMarker = L.marker([o.branch.lat, o.branch.lng], { icon: branchIcon })
                        .addTo(map)
                        .bindPopup('<b style="color:#8B4513;">☕ '+o.branch.name+'</b><br>'+(o.branch.address || ''));
                    branchMarkers.push(bMarker);
                    bounds.push([o.branch.lat, o.branch.lng]);
                }
            }
        });

        // Clear route nếu order active không còn
        if (activeRouteOrder) {
            const stillExists = orders.some(o => o.id === activeRouteOrder.id);
            if (!stillExists) {
                console.log('[MAP] Order active không còn, xóa route');
                clearActiveRoute();
            }
        }

        if (bounds.length > 0 && !isMapFitted) {
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
            isMapFitted = true;
        }
        console.log('[MAP] Đã vẽ xong');
    }

    // ==================== ROUTE ====================
    function clearActiveRoute() {
        console.log('[ROUTE] Xóa route active');
        if (activeRoutePolyline) {
            map.removeLayer(activeRoutePolyline);
            activeRoutePolyline = null;
        }
        activeRouteOrder = null;
    }

    // ==================== FOCUS ORDER - LOGIC CHÍNH ====================
    function focusOrder(idx) {
        const o = allOrders[idx];
        if (!o) {
            console.warn('[FOCUS] Không tìm thấy order tại idx:', idx);
            return;
        }

        console.log('========================================');
        console.log('[FOCUS] Click order #' + o.id);
        console.log('[FOCUS] delivery_status_code:', o.delivery_status_code);
        console.log('[FOCUS] customer_lat:', o.customer_lat, 'customer_lng:', o.customer_lng);
        console.log('[FOCUS] currentShipperLat:', currentShipperLat, 'currentShipperLng:', currentShipperLng);

        // Highlight card
        document.querySelectorAll('.order-card').forEach(c => c.classList.remove('active'));
        const card = document.getElementById('order-card-' + o.id);
        if (card) card.classList.add('active');

        // Clear route cũ
        clearActiveRoute();
        activeRouteOrder = o;

        // Center map vào marker khách
        if (o.customer_lat && o.customer_lng) {
            map.setView([o.customer_lat, o.customer_lng], 16);
            const customerMarker = customerMarkers[idx];
            if (customerMarker) {
                setTimeout(() => { customerMarker.openPopup(); }, 200);
            }
        }

        // Nếu không có dữ liệu cần thiết
        if (!o.branch || !o.branch.lat || !o.branch.lng || !o.customer_lat || !o.customer_lng) {
            console.warn('[FOCUS] Thiếu dữ liệu để vẽ route');
            return;
        }

        console.log('[FOCUS] branch.lat:', o.branch.lat, 'branch.lng:', o.branch.lng);

        // ===== QUYẾT ĐỊNH ĐIỂM BẮT ĐẦU ROUTE =====
        let routeStartLat, routeStartLng, routeStartType;

        // ĐIỀU KIỆN BẮT BUỘC cho GPS: shipping + có GPS thật
        if (o.delivery_status_code === 'shipping' && currentShipperLat !== null && currentShipperLng !== null) {
            // TRƯỜNG HỢP 1: Đơn đang shipping + có GPS
            routeStartLat = currentShipperLat;
            routeStartLng = currentShipperLng;
            routeStartType = 'gps';
            console.log('[FOCUS] Route: GPS -> customer (XANH LÁ)');
        } else {
            // TRƯỜNG HỢP 2: Đơn chưa shipping HOẶC không có GPS
            routeStartLat = o.branch.lat;
            routeStartLng = o.branch.lng;
            routeStartType = 'branch';
            if (o.delivery_status_code === 'shipping') {
                console.log('[FOCUS] Route: branch -> customer (XANH DƯƠNG) - KHÔNG CÓ GPS!');
            } else {
                console.log('[FOCUS] Route: branch -> customer (XANH DƯƠNG) - CHƯA SHIPPING');
            }
        }

        console.log('[FOCUS] Route start:', routeStartLat, routeStartLng, '(type:', routeStartType + ')');
        console.log('[FOCUS] Route end:', o.customer_lat, o.customer_lng);

        // Loading indicator
        if (card) { card.style.opacity = '0.6'; card.style.pointerEvents = 'none'; }

        // Fetch route từ OSRM
        const osrmUrl = 'https://router.project-osrm.org/route/v1/driving/' + routeStartLng + ',' + routeStartLat + ';' + o.customer_lng + ',' + o.customer_lat + '?overview=full&geometries=geojson';
        console.log('[OSRM] URL:', osrmUrl);

        fetch(osrmUrl)
            .then(r => r.json())
            .then(data => {
                if (card) { card.style.opacity = '1'; card.style.pointerEvents = 'auto'; }

                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                    const coords = data.routes[0].geometry.coordinates.map(pos => [pos[1], pos[0]]);
                    console.log('[OSRM] Route nhận được, có', coords.length, 'điểm');
                    drawRoute(coords, routeStartType);
                } else {
                    console.warn('[OSRM] Không nhận được route, dùng tuyến thẳng');
                    drawStraightRoute(routeStartLat, routeStartLng, routeStartType);
                }
            })
            .catch(err => {
                if (card) { card.style.opacity = '1'; card.style.pointerEvents = 'auto'; }
                console.error('[OSRM] Lỗi fetch:', err);
                drawStraightRoute(routeStartLat, routeStartLng, routeStartType);
            });
    }

    // ==================== DRAW ROUTE ====================
    function drawRoute(coords, routeStartType) {
        console.log('[DRAW] Vẽ route, type:', routeStartType);

        // Xóa polyline cũ
        if (activeRoutePolyline) {
            map.removeLayer(activeRoutePolyline);
            activeRoutePolyline = null;
        }

        // Màu và style theo loại
        let color, dashArray;
        if (routeStartType === 'gps') {
            color = '#22c55e';   // Xanh lá - đang giao
            dashArray = null;    // Nét liền
        } else {
            color = '#3498db';   // Xanh dương - chưa giao
            dashArray = '10, 10'; // Nét đứt
        }

        console.log('[DRAW] Màu:', color, 'dashArray:', dashArray);
        console.log('[DRAW] Điểm đầu route:', coords[0]);
        console.log('[DRAW] Điểm cuối route:', coords[coords.length - 1]);

        activeRoutePolyline = L.polyline(coords, {
            color: color,
            weight: 5,
            opacity: 0.85,
            dashArray: dashArray
        }).addTo(map);

        // Center vào điểm giữa
        const midIdx = Math.floor(coords.length / 2);
        const midPoint = coords[midIdx];
        map.setView(midPoint, 15);
    }

    // ==================== DRAW STRAIGHT ROUTE ====================
    function drawStraightRoute(fromLat, fromLng, routeStartType) {
        console.log('[STRAIGHT] Vẽ tuyến thẳng từ:', fromLat, fromLng, 'tới:', activeRouteOrder.customer_lat, activeRouteOrder.customer_lng);
        const coords = [
            [fromLat, fromLng],
            [activeRouteOrder.customer_lat, activeRouteOrder.customer_lng]
        ];
        drawRoute(coords, routeStartType);

        // Warning
        const customerMarker = customerMarkers[allOrders.indexOf(activeRouteOrder)];
        if (customerMarker) {
            setTimeout(() => {
                customerMarker.bindPopup(createCustomerPopup(activeRouteOrder) + '<div style="margin-top:8px;padding:6px;background:#fff3cd;color:#856404;border-radius:4px;font-size:12px;">⚠️ Dùng tuyến dự phòng (đường thẳng)</div>');
                customerMarker.openPopup();
            }, 300);
        }
    }

    // ==================== FETCH ROUTE FROM GPS (cho GPS update) ====================
    function fetchRouteFromGps() {
        if (!activeRouteOrder) return;
        if (activeRouteOrder.delivery_status_code !== 'shipping') return;
        if (currentShipperLat === null || currentShipperLng === null) return;
        if (!activeRouteOrder.customer_lat || !activeRouteOrder.customer_lng) return;

        console.log('[GPS->ROUTE] Cập nhật route từ GPS:');
        console.log('[GPS->ROUTE] Start:', currentShipperLat, currentShipperLng);
        console.log('[GPS->ROUTE] End:', activeRouteOrder.customer_lat, activeRouteOrder.customer_lng);

        const osrmUrl = 'https://router.project-osrm.org/route/v1/driving/' + currentShipperLng + ',' + currentShipperLat + ';' + activeRouteOrder.customer_lng + ',' + activeRouteOrder.customer_lat + '?overview=full&geometries=geojson';

        fetch(osrmUrl)
            .then(r => r.json())
            .then(data => {
                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                    const coords = data.routes[0].geometry.coordinates.map(pos => [pos[1], pos[0]]);
                    console.log('[GPS->ROUTE] Route mới có', coords.length, 'điểm');

                    if (activeRoutePolyline) {
                        map.removeLayer(activeRoutePolyline);
                    }

                    activeRoutePolyline = L.polyline(coords, {
                        color: '#22c55e',
                        weight: 5,
                        opacity: 0.85
                    }).addTo(map);

                    map.fitBounds(activeRoutePolyline.getBounds(), { padding: [80, 80], maxZoom: 16 });
                }
            })
            .catch(err => {
                console.warn('[GPS->ROUTE] Lỗi:', err);
            });
    }

    // ==================== INIT ====================
    console.log('[INIT] Bắt đầu khởi tạo...');
    loadDeliveries();
    startShipperTracking();
    setInterval(loadDeliveries, 30000);

    window.addEventListener('beforeunload', () => {
        if (currentWatchId !== null) {
            navigator.geolocation.clearWatch(currentWatchId);
        }
    });
    </script>
</body>
</html>
