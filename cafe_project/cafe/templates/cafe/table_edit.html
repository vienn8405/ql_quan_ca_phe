{% extends 'cafe/base.html' %}
{% block title %}Sửa Bàn{% endblock %}
{% block page_heading %}Sửa Bàn{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-header-title">✏️ Sửa bàn {{ table.number }}</h2>
    </div>
</div>

<div class="form-container form-narrow">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Số / Tên bàn *</label>
            <input type="text" name="number" class="form-control" value="{{ table.number }}" required>
        </div>
        <div class="form-group">
            <label>Khu vực</label>
            <input type="text" name="area" class="form-control" value="{{ table.area }}">
        </div>
        <div class="form-group">
            <label>Sức chứa (người)</label>
            <input type="number" name="capacity" class="form-control" value="{{ table.capacity }}" min="1" max="50">
        </div>
        <div class="form-group">
            <label>Trạng thái</label>
            <select name="status" class="form-control">
                <option value="available" {% if table.status == 'available' %}selected{% endif %}>🟢 Trống</option>
                <option value="occupied" {% if table.status == 'occupied' %}selected{% endif %}>🔴 Đang dùng</option>
                <option value="reserved" {% if table.status == 'reserved' %}selected{% endif %}>🟡 Đã đặt trước</option>
            </select>
        </div>
        <div class="form-group">
            <label>Thuộc Chi Nhánh</label>
            <select name="branch" class="form-control" required>
                <option value="">-- Chọn chi nhánh --</option>
                {% for b in branches %}
                <option value="{{ b.id }}" {% if table.branch_id == b.id %}selected{% endif %}>{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-action-row-v3">
            <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
            <a href="{% url 'table_list' %}" class="btn-cancel">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
