{% extends 'cafe/base.html' %}
{% load currency_filters %}
{% block title %}Sửa đơn hàng{% endblock %}
{% block page_heading %}Sửa đơn hàng{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-header-title">✏️ Sửa đơn hàng</h2>
        <p class="page-header-desc">Cập nhật sản phẩm và số lượng cho đơn hàng.</p>
    </div>
    <div class="page-header-actions">
        <a href="/admin/orders/" class="btn btn-secondary">⬅ Quay lại</a>
    </div>
</div>

<div class="form-container form-narrow">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Sản phẩm</label>
            <select name="product" required class="form-control">
                {% for p in products %}
                    <option value="{{ p.id }}" {% if p.id == item.product.id %}selected{% endif %}>
                        {{ p.name }} - {{ p.price|vnd }} (còn {{ p.inventory.quantity }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Số lượng</label>
            <input type="number" name="quantity" value="{{ item.quantity }}" min="1" required class="form-control">
        </div>

        <div class="form-action-row-v3">
            <button type="submit" class="btn btn-primary">💾 Cập nhật đơn</button>
            <a href="/admin/orders/" class="btn-cancel">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
