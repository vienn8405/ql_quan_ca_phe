{% extends 'cafe/base.html' %}
{% block title %}Thêm Bàn{% endblock %}
{% block page_heading %}Thêm Bàn{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-header-title">➕ Thêm bàn mới</h2>
    </div>
</div>

<div class="form-container form-narrow">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Số / Tên bàn *</label>
            <input type="text" name="number" class="form-control" placeholder="Ví dụ: B01, VIP1..." required>
        </div>
        <div class="form-group">
            <label>Khu vực</label>
            <input type="text" name="area" class="form-control" placeholder="Trong quán / Ngoài sân / VIP...">
        </div>
        <div class="form-group">
            <label>Sức chứa (người)</label>
            <input type="number" name="capacity" class="form-control" value="4" min="1" max="50">
        </div>
        <div class="form-group">
            <label>Trạng thái</label>
            <select name="status" class="form-control">
                <option value="available">🟢 Trống</option>
                <option value="occupied">🔴 Đang dùng</option>
                <option value="reserved">🟡 Đã đặt trước</option>
            </select>
        </div>
        <div class="form-group">
            <label>Thuộc Chi Nhánh</label>
            <select name="branch" class="form-control" required>
                <option value="">-- Chọn chi nhánh --</option>
                {% for b in branches %}
                <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-action-row-v3">
            <button type="submit" class="btn btn-primary">💾 Lưu bàn</button>
            <a href="{% url 'table_list' %}" class="btn-cancel">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
