{% extends 'cafe/base.html' %}

{% block title %}Thêm loại sản phẩm{% endblock %}
{% block page_heading %}Thêm loại sản phẩm{% endblock %}

{% block content %}
<div class="form-page-wrap">
    <div class="form-card">
        <div class="page-header mb-md">
            <div>
                <h2 class="page-header-title">Thêm loại sản phẩm</h2>
                <p class="page-header-desc">Tạo danh mục mới để phân loại đồ uống trong menu.</p>
            </div>
            <div class="page-header-actions">
                <a href="{% url 'category_list' %}" class="btn btn-secondary">← Quay lại danh mục</a>
            </div>
        </div>

        <form method="post" class="admin-form-grid">
            {% csrf_token %}

            <div class="form-group full-width">
                <label for="name">Tên loại sản phẩm</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Ví dụ: Cà phê, Trà, Nước ép..." required>
            </div>

            <div class="form-actions full-width">
                <button type="submit" class="btn btn-primary">💾 Lưu danh mục</button>
                <a href="{% url 'category_list' %}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
