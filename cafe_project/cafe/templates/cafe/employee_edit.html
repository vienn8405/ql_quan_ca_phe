{% extends 'cafe/base.html' %}
{% block title %}Sửa nhân viên{% endblock %}
{% block page_heading %}Sửa nhân viên{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-header-title">✏️ Sửa nhân viên</h2>
        <p class="page-header-desc">Cập nhật thông tin nhân viên {{ employee.name }}.</p>
    </div>
    <div class="page-header-actions">
        <a href="/admin/employees/" class="btn btn-secondary">⬅ Quay lại</a>
    </div>
</div>

<div class="form-container form-narrow">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên nhân viên</label>
            <input name="name" value="{{ employee.name }}" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Chức vụ</label>
            <input name="role" value="{{ employee.role }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Số điện thoại</label>
            <input name="phone" value="{{ employee.phone }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Lương</label>
            <input name="salary" value="{{ employee.salary }}" class="form-control">
        </div>
        <div class="form-action-row-v3">
            <button type="submit" class="btn btn-primary">💾 Cập nhật</button>
            <a href="/admin/employees/" class="btn-cancel">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
