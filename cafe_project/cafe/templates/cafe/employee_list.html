{% extends 'cafe/base.html' %}

{% block content %}
<h1>Quản lý nhân viên</h1>

<a href="/admin/employees/add/">➕ Thêm nhân viên</a>
<br><br>

<table border="1">
    <tr>
        <th>Tên</th>
        <th>Chức vụ</th>
        <th>SĐT</th>
        <th>Lương</th>
        <th>Hành động</th>
    </tr>
    {% for e in employees %}
    <tr>
        <td>{{ e.name }}</td>
        <td>{{ e.role }}</td>
        <td>{{ e.phone }}</td>
        <td>{{ e.salary }}</td>
        <td>
            <a href="/admin/employees/edit/{{ e.id }}/">✏️ Sửa</a>
            |
            <a href="/admin/employees/delete/{{ e.id }}/">❌ Xóa</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/admin/">⬅ Dashboard</a>
{% endblock %}
