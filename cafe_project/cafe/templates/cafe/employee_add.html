{% extends 'cafe/base.html' %}
{% block title %}Thêm nhân viên{% endblock %}
{% block page_heading %}Thêm nhân viên{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-header-title">👤 Thêm nhân viên</h2>
        <p class="page-header-desc">Đăng ký thông tin nhân viên mới vào hệ thống.</p>
    </div>
    <div class="page-header-actions">
        <a href="/admin/employees/" class="btn btn-secondary">⬅ Quay lại</a>
    </div>
</div>

<div class="form-container form-narrow">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên nhân viên</label>
            <input name="name" placeholder="Tên nhân viên" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Chức vụ</label>
            <input name="role" placeholder="Chức vụ" class="form-control">
        </div>
        <div class="form-group">
            <label>Số điện thoại</label>
            <input name="phone" placeholder="Số điện thoại" class="form-control">
        </div>
        <div class="form-group">
            <label>Lương</label>
            <input name="salary" placeholder="Lương" class="form-control">
        </div>
        <div class="form-action-row-v3">
            <button type="submit" class="btn btn-primary">💾 Lưu</button>
            <a href="/admin/employees/" class="btn-cancel">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
